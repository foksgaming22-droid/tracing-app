<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Tracing Cam</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #camera {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    .overlay-stage {
      position: absolute;
      inset: 0;
      z-index: 5;
      overflow: hidden;
      touch-action: none;
    }

    #overlayImage {
      position: absolute;
      top: 50%;
      left: 50%;
      max-width: none;
      max-height: none;
      transform-origin: center center;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      display: none;
    }

    .grid {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      display: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.18) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .top-ui {
      position: absolute;
      top: calc(10px + env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: opacity 0.2s ease;
    }

    .status {
      background: rgba(0,0,0,0.62);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.35;
      backdrop-filter: blur(10px);
    }

    .hint {
      align-self: center;
      background: rgba(0,0,0,0.55);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      padding: 10px 10px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,0.94), rgba(0,0,0,0.72));
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .ui-hidden .top-ui {
      opacity: 0;
      pointer-events: none;
    }

    .ui-hidden .controls {
      opacity: 0;
      transform: translateY(100%);
      pointer-events: none;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .row.compact {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 8px;
      align-items: center;
    }

    button, .file-btn {
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      background: #1f1f1f;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      min-height: 42px;
    }

    button:active, .file-btn:active {
      transform: scale(0.98);
    }

    .file-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .camera-on {
      background: #7a1f1f;
    }

    input[type="file"] {
      display: none;
    }

    input[type="range"] {
      width: 100%;
    }

    .floating-toggle {
      position: absolute;
      right: 14px;
      bottom: calc(180px + env(safe-area-inset-bottom));
      z-index: 30;
      border-radius: 999px;
      min-width: 52px;
      min-height: 52px;
      background: rgba(0,0,0,0.68);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <video id="camera" autoplay playsinline muted></video>

    <div class="overlay-stage" id="overlayStage">
      <img id="overlayImage" alt="Vorlage" />
      <div class="grid" id="grid"></div>
    </div>

    <div class="top-ui" id="topUi">
      <div class="status" id="status">
        Seite geladen. Tippe auf „Kamera“.
      </div>
      <div class="hint" id="hint">
        1 Finger = verschieben · 2 Finger = zoomen
      </div>
    </div>

    <button id="toggleUiBtn" class="floating-toggle">👁</button>

    <div class="controls" id="controls">
      <div class="row">
        <label class="file-btn" for="fileInput">Bild</label>
        <input id="fileInput" type="file" accept="image/*" />

        <button id="cameraBtn">Kamera</button>
        <button id="switchBtn">Wechseln</button>
        <button id="mirrorBtn">Spiegeln</button>
        <button id="gridBtn">Raster</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="row compact">
        <span>Deckkraft</span>
        <input id="opacitySlider" type="range" min="0.05" max="1" step="0.01" value="0.65" />
      </div>

      <div class="row compact">
        <span>Zoom</span>
        <input id="scaleSlider" type="range" min="0.2" max="6" step="0.01" value="1" />
      </div>

      <div class="row compact">
        <span>Raster</span>
        <input id="gridSizeSlider" type="range" min="10" max="80" step="1" value="30" />
      </div>
    </div>
  </div>

  <script>
    const app = document.getElementById("app");
    const fileInput = document.getElementById("fileInput");
    const overlayImage = document.getElementById("overlayImage");
    const overlayStage = document.getElementById("overlayStage");
    const opacitySlider = document.getElementById("opacitySlider");
    const scaleSlider = document.getElementById("scaleSlider");
    const gridSizeSlider = document.getElementById("gridSizeSlider");
    const mirrorBtn = document.getElementById("mirrorBtn");
    const resetBtn = document.getElementById("resetBtn");
    const gridBtn = document.getElementById("gridBtn");
    const grid = document.getElementById("grid");
    const camera = document.getElementById("camera");
    const cameraBtn = document.getElementById("cameraBtn");
    const switchBtn = document.getElementById("switchBtn");
    const statusBox = document.getElementById("status");
    const toggleUiBtn = document.getElementById("toggleUiBtn");

    let posX = 0;
    let posY = 0;
    let scale = 1;
    let opacity = 0.65;
    let mirrored = false;
    let gridVisible = false;
    let stream = null;
    let facingMode = "environment";
    let uiHidden = false;

    let dragStartX = 0;
    let dragStartY = 0;
    let startPosX = 0;
    let startPosY = 0;
    let isDragging = false;

    let pinchStartDistance = 0;
    let pinchStartScale = 1;
    let isPinching = false;

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function updateOverlay() {
      const scaleX = mirrored ? -scale : scale;
      overlayImage.style.opacity = opacity;
      overlayImage.style.transform =
        `translate(-50%, -50%) translate(${posX}px, ${posY}px) scale(${scaleX}, ${scale})`;
      scaleSlider.value = scale;
    }

    function updateGrid() {
      const size = gridSizeSlider.value;
      grid.style.backgroundSize = `${size}px ${size}px`;
    }

    function resetOverlay() {
      posX = 0;
      posY = 0;
      scale = 1;
      opacity = 0.65;
      mirrored = false;
      opacitySlider.value = "0.65";
      scaleSlider.value = "1";
      updateOverlay();
    }

    function updateCameraButton() {
      if (stream) {
        cameraBtn.textContent = "Kamera aus";
        cameraBtn.classList.add("camera-on");
      } else {
        cameraBtn.textContent = "Kamera";
        cameraBtn.classList.remove("camera-on");
      }
    }

    async function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      camera.srcObject = null;
      updateCameraButton();
    }

    async function toggleCamera() {
      try {
        if (stream) {
          await stopCamera();
          setStatus("Kamera ausgeschaltet.");
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus("Kamera wird auf diesem Gerät oder Browser nicht unterstützt.");
          return;
        }

        const constraints = {
          audio: false,
          video: {
            facingMode: { ideal: facingMode }
          }
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        camera.srcObject = stream;
        updateCameraButton();
        setStatus(`Kamera aktiv (${facingMode === "environment" ? "hinten" : "vorne"}).`);
      } catch (error) {
        console.error(error);
        setStatus("Kamera konnte nicht gestartet werden. Prüfe Safari-Berechtigungen.");
        await stopCamera();
      }
    }

    async function switchCamera() {
      facingMode = facingMode === "environment" ? "user" : "environment";

      if (stream) {
        await stopCamera();
        await toggleCamera();
      } else {
        setStatus(`Kamera-Seite gewählt: ${facingMode === "environment" ? "hinten" : "vorne"}.`);
      }
    }

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        overlayImage.src = event.target.result;
        overlayImage.style.display = "block";
        resetOverlay();
        setStatus("Bild geladen.");
      };
      reader.readAsDataURL(file);
    });

    opacitySlider.addEventListener("input", () => {
      opacity = parseFloat(opacitySlider.value);
      updateOverlay();
    });

    scaleSlider.addEventListener("input", () => {
      scale = parseFloat(scaleSlider.value);
      updateOverlay();
    });

    gridSizeSlider.addEventListener("input", updateGrid);

    mirrorBtn.addEventListener("click", () => {
      mirrored = !mirrored;
      updateOverlay();
    });

    resetBtn.addEventListener("click", () => {
      resetOverlay();
      setStatus("Ansicht zurückgesetzt.");
    });

    gridBtn.addEventListener("click", () => {
      gridVisible = !gridVisible;
      grid.style.display = gridVisible ? "block" : "none";
    });

    cameraBtn.addEventListener("click", async () => {
      await toggleCamera();
    });

    switchBtn.addEventListener("click", async () => {
      await switchCamera();
    });

    toggleUiBtn.addEventListener("click", () => {
      uiHidden = !uiHidden;
      app.classList.toggle("ui-hidden", uiHidden);
      toggleUiBtn.textContent = uiHidden ? "⚙️" : "👁";
    });

    function getDistance(t1, t2) {
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function clampScale(value) {
      return Math.min(6, Math.max(0.2, value));
    }

    overlayStage.addEventListener("mousedown", (e) => {
      if (overlayImage.style.display === "none") return;
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      startPosX = posX;
      startPosY = posY;
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging || isPinching) return;
      posX = startPosX + (e.clientX - dragStartX);
      posY = startPosY + (e.clientY - dragStartY);
      updateOverlay();
    });

    window.addEventListener("mouseup", () => {
      isDragging = false;
    });

    overlayStage.addEventListener("touchstart", (e) => {
      if (overlayImage.style.display === "none") return;

      if (e.touches.length === 1) {
        isDragging = true;
        isPinching = false;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        startPosX = posX;
        startPosY = posY;
      } else if (e.touches.length === 2) {
        isDragging = false;
        isPinching = true;
        pinchStartDistance = getDistance(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
      }
    }, { passive: false });

    overlayStage.addEventListener("touchmove", (e) => {
      if (overlayImage.style.display === "none") return;

      if (e.touches.length === 1 && isDragging && !isPinching) {
        e.preventDefault();
        posX = startPosX + (e.touches[0].clientX - dragStartX);
        posY = startPosY + (e.touches[0].clientY - dragStartY);
        updateOverlay();
      } else if (e.touches.length === 2) {
        e.preventDefault();
        const currentDistance = getDistance(e.touches[0], e.touches[1]);
        const zoomFactor = currentDistance / pinchStartDistance;
        scale = clampScale(pinchStartScale * zoomFactor);
        updateOverlay();
      }
    }, { passive: false });

    overlayStage.addEventListener("touchend", (e) => {
      if (e.touches.length === 0) {
        isDragging = false;
        isPinching = false;
      } else if (e.touches.length === 1) {
        isPinching = false;
        isDragging = true;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        startPosX = posX;
        startPosY = posY;
      }
    });

    updateOverlay();
    updateGrid();
    updateCameraButton();
  </script>
</body>
</html>
